<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CloudShield AI - Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #080c14; font-family: 'Rajdhani', sans-serif; color: white; min-height: 100vh; }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,255,136,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,136,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .navbar {
            position: relative;
            z-index: 10;
            background: rgba(0,0,0,0.6);
            border-bottom: 1px solid rgba(0,255,136,0.15);
            padding: 16px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .brand {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .brand span { color: #00ff88; }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-badge {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            color: #00ff88;
            background: rgba(0,255,136,0.08);
            border: 1px solid rgba(0,255,136,0.2);
            padding: 6px 14px;
            border-radius: 20px;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid rgba(255,80,80,0.3);
            color: #ff6b6b;
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.2s;
        }

        .logout-btn:hover { background: rgba(255,80,80,0.1); }

        .main { position: relative; z-index: 1; padding: 24px 30px; }

        .banner {
            border-radius: 12px;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
            border: 1px solid;
        }

        .banner.safe {
            background: rgba(0,255,136,0.05);
            border-color: rgba(0,255,136,0.2);
        }

        .banner.danger {
            background: rgba(255,60,60,0.05);
            border-color: rgba(255,60,60,0.2);
        }

        .banner-icon { font-size: 2rem; }

        .banner-title {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .banner.safe .banner-title { color: #00ff88; }
        .banner.danger .banner-title { color: #ff6b6b; }

        .banner-subtitle {
            font-size: 0.85rem;
            margin-top: 4px;
            font-family: 'Share Tech Mono', monospace;
        }

        .banner.safe .banner-subtitle { color: rgba(0,255,136,0.6); }
        .banner.danger .banner-subtitle { color: rgba(255,107,107,0.6); }

        .card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(0,255,136,0.1);
            border-radius: 12px;
            padding: 24px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #00ff88;
        }

        .refresh-btn {
            background: rgba(0,255,136,0.08);
            color: #00ff88;
            border: 1px solid rgba(0,255,136,0.2);
            padding: 8px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.2s;
        }

        .refresh-btn:hover { background: rgba(0,255,136,0.15); }

        table { width: 100%; border-collapse: collapse; }

        th {
            text-align: left;
            padding: 10px 14px;
            color: rgba(0,255,136,0.5);
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-family: 'Share Tech Mono', monospace;
            border-bottom: 1px solid rgba(0,255,136,0.1);
        }

        td {
            padding: 14px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            font-size: 0.9rem;
            color: #ccc;
        }

        tr:hover td { background: rgba(0,255,136,0.02); }

        .badge {
            padding: 5px 14px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.8rem;
            letter-spacing: 1px;
            font-family: 'Share Tech Mono', monospace;
        }

        .badge.safe {
            background: rgba(0,255,136,0.1);
            color: #00ff88;
            border: 1px solid rgba(0,255,136,0.3);
        }

        .badge.suspicious {
            background: rgba(255,60,60,0.1);
            color: #ff6b6b;
            border: 1px solid rgba(255,60,60,0.3);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #444;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="brand">🛡️ Cloud<span>Shield</span> AI</div>
        <div class="nav-right">
            <div class="user-badge" id="userBadge">loading...</div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="main">
        <div class="banner safe" id="statusBanner">
            <div class="banner-icon" id="bannerIcon">✅</div>
            <div>
                <div class="banner-title" id="bannerTitle">Loading Security Status...</div>
                <div class="banner-subtitle" id="bannerSubtitle">Fetching latest login data...</div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <div class="card-title">Decision Log</div>
                <button class="refresh-btn" onclick="loadLogs()">⟳ Refresh</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Timestamp</th>
                        <th>User</th>
                        <th>Location (IP)</th>
                        <th>Decision</th>
                        <th>AI Reason</th>
                    </tr>
                </thead>
                <tbody id="logsBody">
                    <tr><td colspan="5" class="loading">⟳ Loading logs...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = 'https://vz3hnf6n5f.execute-api.us-east-1.amazonaws.com';

        // Auth check — if not logged in, redirect to login page
        const token = localStorage.getItem('cloudshield_token');
        const userEmail = localStorage.getItem('cloudshield_user');

        if (!token) {
            window.location.href = 'index.html';
        }

        document.getElementById('userBadge').textContent = userEmail || 'unknown';

        function logout() {
            localStorage.removeItem('cloudshield_token');
            localStorage.removeItem('cloudshield_user');
            window.location.href = 'index.html';
        }

        function formatUser(arn) {
            if (!arn) return 'Unknown';
            const parts = arn.split(':');
            return parts[parts.length - 1] || arn;
        }

        function formatTime(ts) {
            if (!ts) return 'Unknown';
            const d = new Date(ts);
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
        }

        function extractReason(aiVerdict) {
            if (!aiVerdict) return 'No analysis available';
            const lines = aiVerdict.split('\n');
            for (const line of lines) {
                if (line.toLowerCase().includes('reason:')) {
                    return line.replace(/reason:/i, '').trim();
                }
            }
            return aiVerdict.substring(0, 120) + '...';
        }

        function updateBanner(logs) {
            const banner   = document.getElementById('statusBanner');
            const icon     = document.getElementById('bannerIcon');
            const title    = document.getElementById('bannerTitle');
            const subtitle = document.getElementById('bannerSubtitle');

            if (!logs || logs.length === 0) {
                title.textContent   = 'No Login Activity Yet';
                subtitle.textContent = 'Login to your AWS account to generate logs.';
                return;
            }

            const latest = logs[0];
            const isSuspicious = latest.decision === 'SUSPICIOUS';

            if (isSuspicious) {
                banner.className     = 'banner danger';
                icon.textContent     = '⚠️';
                title.textContent    = 'Warning: Suspicious Login Detected!';
                subtitle.textContent = 'Instant Alert (SNS) Sent to Admin via Email.';
            } else {
                banner.className     = 'banner safe';
                icon.textContent     = '✅';
                title.textContent    = 'System Secure — No Suspicious Activity';
                subtitle.textContent = 'Normal Activity Log Stored.';
            }
        }

        async function loadLogs() {
            const tbody = document.getElementById('logsBody');
            tbody.innerHTML = '<tr><td colspan="5" class="loading">⟳ Loading logs...</td></tr>';

            try {
                const response = await fetch(`${API_URL}/logs`, {
                    headers: { 'Authorization': token }
                });
                const logs = await response.json();

                updateBanner(logs);

                if (!logs || logs.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="loading">No logs yet. Login to AWS to generate logs!</td></tr>';
                    return;
                }

                tbody.innerHTML = logs.map(log => {
                    const isSuspicious = log.decision === 'SUSPICIOUS';
                    const badgeClass   = isSuspicious ? 'suspicious' : 'safe';
                    const badgeText    = isSuspicious ? '🚨 SUSPICIOUS' : '✅ SAFE';
                    const reason       = extractReason(log.aiVerdict);

                    return `
                        <tr>
                            <td style="font-family:'Share Tech Mono',monospace;font-size:0.8rem">${formatTime(log.timestamp)}</td>
                            <td style="font-family:'Share Tech Mono',monospace;font-size:0.8rem">${formatUser(log.user)}</td>
                            <td>${log.location || log.ip || 'Unknown'}</td>
                            <td><span class="badge ${badgeClass}">${badgeText}</span></td>
                            <td style="font-size:0.85rem;color:#aaa">${reason}</td>
                        </tr>
                    `;
                }).join('');

            } catch (error) {
                tbody.innerHTML = `<tr><td colspan="5" class="loading">❌ Error: ${error.message}</td></tr>`;
            }
        }

        loadLogs();
        setInterval(loadLogs, 30000);
    </script>
</body>
</html>
